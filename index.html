/* ============================================================================
   Pinecrest Capital — track record data
   ----------------------------------------------------------------------------
   HOW THE DATA WORKS
   The app shows ONE curve: net cumulative performance, indexed to 100.00% at
   inception (1 Jul 2026). Each point is the fund's value on a trading day.

   ▶ TO PUT IN REAL NUMBERS — you do NOT edit this file.
     Create a file called  data.txt  next to index.html (in your GitHub repo)
     with one line per trading day:

         2026-07-01, 100.00
         2026-07-02, 100.31
         2026-07-03, 99.88
         ...

     Format: YYYY-MM-DD, value   (value = percent, 100 = inception).
     Lines starting with #  are ignored (use them for notes).
     Commit the file — the app loads it automatically and hides the
     "sample data" notice. Edit data.txt anytime to update the chart.

   If there is no data.txt, the app falls back to the illustrative sample
   curve below so it never looks empty.
   ========================================================================== */

(function () {
  const INCEPTION = Date.UTC(2026, 6, 1); // 1 July 2026

  // ---- deterministic sample generator (fallback only) ----------------------
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function gauss(rng) {
    let u = 0, v = 0;
    while (u === 0) u = rng();
    while (v === 0) v = rng();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }
  function buildSampleSeries() {
    const rng = mulberry32(20260701);
    const pts = [];
    let value = 100;
    const TRADING_DAYS = 124;
    let cursor = new Date(INCEPTION);
    let made = 0;
    while (made < TRADING_DAYS) {
      const dow = cursor.getUTCDay();
      if (dow !== 0 && dow !== 6) {
        if (made === 0) { value = 100; }
        else {
          let mu = 0.0019; const sigma = 0.0094;
          if (made > 54 && made < 70) mu = -0.0042;
          if (made >= 70 && made < 80) mu = 0.0040;
          let r = mu + sigma * gauss(rng);
          r = Math.max(-0.034, Math.min(0.034, r));
          value = value * (1 + r);
        }
        pts.push({ t: cursor.getTime(), v: Math.round(value * 100) / 100 });
        made++;
      }
      cursor = new Date(cursor.getTime() + 24 * 3600 * 1000);
    }
    return pts;
  }

  // ---- live state ----------------------------------------------------------
  const state = { points: buildSampleSeries(), sample: true };

  // ---- parse the human-friendly data.txt format ----------------------------
  function parseText(txt) {
    const pts = [];
    (txt || '').split(/\r?\n/).forEach((line) => {
      const s = line.trim();
      if (!s || s[0] === '#') return;
      const parts = s.split(/[,;\t]/);
      if (parts.length < 2) return;
      const t = Date.parse(parts[0].trim() + 'T00:00:00Z');
      const v = parseFloat(parts[1]);
      if (!isNaN(t) && isFinite(v)) pts.push({ t, v });
    });
    pts.sort((a, b) => a.t - b.t);
    return pts;
  }

  // ---- try to load real data; resolve true if real data was applied --------
  async function load(url) {
    try {
      const res = await fetch(url || 'data.txt', { cache: 'no-store' });
      if (!res.ok) return false;
      const pts = parseText(await res.text());
      if (pts.length >= 1) { state.points = pts; state.sample = false; return true; }
    } catch (e) { /* no data.txt → keep sample */ }
    return false;
  }

  // ---- derived helpers (read live state, so they recompute) ----------------
  const P = () => state.points;
  function latest() { return P()[P().length - 1]; }
  function inception() { return P()[0]; }
  function maxValue() { return P().reduce((m, p) => Math.max(m, p.v), -Infinity); }
  function maxDrawdown() {
    const pts = P();
    if (pts.length < 2) return 0;
    let peak = -Infinity, mdd = 0;
    for (const p of pts) { peak = Math.max(peak, p.v); mdd = Math.min(mdd, (p.v - peak) / peak); }
    return mdd * 100;
  }
  function volatility() {
    const pts = P();
    if (pts.length < 2) return 0;
    const rets = [];
    for (let i = 1; i < pts.length; i++) rets.push(Math.log(pts[i].v / pts[i - 1].v));
    const mean = rets.reduce((a, b) => a + b, 0) / rets.length;
    const varr = rets.reduce((a, b) => a + (b - mean) ** 2, 0) / rets.length;
    return Math.sqrt(varr) * Math.sqrt(252) * 100;
  }
  function slice(rangeKey) {
    const pts = P();
    if (pts.length < 2) return pts.slice();
    const last = latest().t;
    const day = 24 * 3600 * 1000;
    let from = -Infinity;
    if (rangeKey === '1M') from = last - 31 * day;
    else if (rangeKey === '3M') from = last - 93 * day;
    const s = pts.filter(p => p.t >= from);
    return s.length >= 2 ? s : pts.slice(-2);
  }

  window.PCC = {
    INCEPTION,
    get points() { return state.points; },
    get SAMPLE() { return state.sample; },
    parseText, load,
    latest, inception, maxValue, maxDrawdown, volatility, slice,
  };
})();
